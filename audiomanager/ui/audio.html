<!DOCTYPE html>
<html>
<head>
  <title>Audio Manager</title>
</head>

<body>

<h2>Audio Manager</h2>

<div id="rootBox"></div>

<table id="audioTable"></table>

<script type="module">
  async function loadAudioList() {
    const res = await fetch("/api/audio-list");
    return await res.json();
  }

  function render(list) {
    const table = document.getElementById("audioTable");

    table.innerHTML = list.map(item => `
      <tr>
        <td>${item.file}</td>
        <td>${item.tags?.join(", ") || "-"}</td>
      </tr>
    `).join("");
  }

  async function init() {
    const list = await loadAudioList();
    render(list);
  }

  init();
</script>

</body>
</html>
